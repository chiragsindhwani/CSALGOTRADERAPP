name: CI — SPY Iron Condor 0DTE

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff — check source
        run: |
          ruff check \
            iron_condor_0dte/ \
            generate_tradier_data.py \
            run_manual_trade.py \
            resend_telegram_alert.py \
            --ignore E501,E402

  # ── Job 2: Security guards ───────────────────────────────────────────────────
  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard — .env must NOT be tracked
        run: |
          if git ls-files | grep -qx '\.env'; then
            echo "::error::.env is tracked by git — remove it and rotate credentials!"
            exit 1
          fi
          echo ".env is correctly gitignored."

      - name: Guard — no hardcoded bearer tokens in source
        run: |
          if grep -rEn "Bearer [A-Za-z0-9]{15,}" iron_condor_0dte/ generate_tradier_data.py; then
            echo "::error::Hardcoded API token found in source files"
            exit 1
          fi
          echo "No hardcoded tokens found."

      - name: Guard — tradier_account_data.js must NOT be tracked
        run: |
          if git ls-files | grep -q "tradier_account_data.js"; then
            echo "::error::tradier_account_data.js (live account data) is tracked — add it to .gitignore"
            exit 1
          fi
          echo "Account data file is correctly gitignored."

  # ── Job 3: Unit tests ────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        env:
          TRADIER_API_TOKEN:  ci_dummy_not_real
          TRADIER_ACCOUNT_ID: TESTACCT
          TRADIER_PAPER_TRADE: "true"
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=iron_condor_0dte \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # ── Job 4: Config sanity check ───────────────────────────────────────────────
  config-check:
    name: Config sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate live trading config
        env:
          TRADIER_API_TOKEN:  ci_dummy
          TRADIER_ACCOUNT_ID: TESTACCT
          TRADIER_PAPER_TRADE: "true"
        run: |
          python - <<'EOF'
          from iron_condor_0dte.config import config

          assert config.TARGET_DELTA == 0.15,          "FAIL: TARGET_DELTA != 0.15"
          assert config.WING_WIDTH == 5.0,             f"FAIL: WING_WIDTH={config.WING_WIDTH}, expected 5.0"
          assert config.MIN_CREDIT == 0.40,            f"FAIL: MIN_CREDIT={config.MIN_CREDIT}, expected 0.40"
          assert config.MIN_ACTUAL_CREDIT == 0.10,     f"FAIL: MIN_ACTUAL_CREDIT={config.MIN_ACTUAL_CREDIT}, expected 0.10"
          assert config.PROFIT_TARGET_PCT == 0.35,     "FAIL: PROFIT_TARGET_PCT != 0.35"
          assert config.STOP_LOSS_MULT == 0.45,        "FAIL: STOP_LOSS_MULT != 0.45"
          assert config.ENTRY_HOUR == 10,              "FAIL: ENTRY_HOUR != 10 (10:15 AM ET)"
          assert config.ENTRY_MIN  == 15,              "FAIL: ENTRY_MIN != 15"
          assert config.FORCE_CLOSE_HOUR == 15,        "FAIL: FORCE_CLOSE_HOUR != 15"
          assert config.FORCE_CLOSE_MIN  == 45,        "FAIL: FORCE_CLOSE_MIN != 45"
          assert config.PDT_MAX_DAY_TRADES == 3,       "FAIL: PDT_MAX_DAY_TRADES != 3"
          assert config.PDT_WINDOW_DAYS == 5,          "FAIL: PDT_WINDOW_DAYS != 5"
          assert config.MAX_VIX == 30.0,               "FAIL: MAX_VIX != 30.0"

          commission = 4 * config.CONTRACTS * 0.35 * 2
          print(f"Config OK | Contracts={config.CONTRACTS} | Wing=${config.WING_WIDTH} | Commission/trade=${commission:.2f}")
          print(f"Entry: {config.ENTRY_HOUR}:{config.ENTRY_MIN:02d} ET | Force-close: {config.FORCE_CLOSE_HOUR}:{config.FORCE_CLOSE_MIN:02d} ET")
          print(f"Min credit: ${config.MIN_CREDIT:.2f}/shr | Min actual: ${config.MIN_ACTUAL_CREDIT:.2f}/shr")
          EOF
